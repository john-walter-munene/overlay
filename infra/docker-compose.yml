services:
  postgres:
    image: postgres:16-alpine
    container_name: overlay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: overlay
      POSTGRES_PASSWORD: overlay
      POSTGRES_DB: overlay
    ports:
      - "5432:5432"
    volumes:
      - overlay-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overlay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: overlay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - overlay-redisdata:/data

volumes:
  overlay-pgdata:
  overlay-redisdata:
