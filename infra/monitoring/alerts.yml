# Overlay Bets — SLO alert rules (OB-093).
#
# Load into Prometheus via `rule_files` (see prometheus.yml). Every alert carries
# a `severity` label that Alertmanager routes to the on-call channel
# (severity=page -> PagerDuty, severity=ticket -> Slack) and a `runbook_url`
# pointing at the on-call runbook (OB-095, docs/RUNBOOK-ONCALL.md). Metric names
# are emitted by the API
# at GET /api/metrics (see apps/api/src/common/metrics.ts).

groups:
  - name: overlay-slos
    rules:
      # --- Settlement latency SLO -------------------------------------------
      # SLO: p95 settlement cycle completes in < 30s. Page if p95 > 60s sustained.
      - alert: SettlementCycleLatencyHigh
        expr: >
          histogram_quantile(
            0.95,
            sum(rate(overlay_settlement_cycle_duration_seconds_bucket[5m])) by (le)
          ) > 60
        for: 10m
        labels:
          severity: page
          service: settlement
        annotations:
          summary: "Settlement p95 latency > 60s"
          description: "p95 settlement cycle duration has exceeded 60s for 10m (SLO: <30s)."
          runbook_url: "https://github.com/CognitronTechnologies/overlay/blob/main/docs/RUNBOOK-ONCALL.md"

      # --- Settlement error-rate / freshness SLO ----------------------------
      # SLO: settlement cycles succeed. Page on any failures in the last 15m.
      - alert: SettlementCyclesFailing
        expr: increase(overlay_settlement_cycles_total{outcome="failure"}[15m]) > 0
        for: 5m
        labels:
          severity: page
          service: settlement
        annotations:
          summary: "Settlement cycles are failing"
          description: "At least one settlement cycle failed in the last 15m."
          runbook_url: "https://github.com/CognitronTechnologies/overlay/blob/main/docs/RUNBOOK-ONCALL.md"

      # SLO: a settlement cycle runs at least every few minutes. Page if the
      # pipeline is stalled (no successful cycle in 15m).
      - alert: SettlementStalled
        expr: increase(overlay_settlement_cycles_total{outcome="success"}[15m]) == 0
        for: 15m
        labels:
          severity: page
          service: settlement
        annotations:
          summary: "Settlement pipeline stalled"
          description: "No successful settlement cycle completed in the last 15m."
          runbook_url: "https://github.com/CognitronTechnologies/overlay/blob/main/docs/RUNBOOK-ONCALL.md"

      # --- Webhook failure SLO ----------------------------------------------
      # SLO: < 5% of payment webhooks fail verification/handling over 15m.
      - alert: WebhookFailureRateHigh
        expr: >
          sum(rate(overlay_webhook_events_total{result="failed"}[15m]))
            /
          clamp_min(sum(rate(overlay_webhook_events_total[15m])), 1)
          > 0.05
        for: 10m
        labels:
          severity: page
          service: payments
        annotations:
          summary: "Payment webhook failure rate > 5%"
          description: "More than 5% of payment webhooks failed over the last 15m."
          runbook_url: "https://github.com/CognitronTechnologies/overlay/blob/main/docs/RUNBOOK-ONCALL.md"

      # --- Queue depth SLO --------------------------------------------------
      # SLO: settlement backlog stays small. Warn on a growing backlog.
      - alert: SettlementQueueDepthHigh
        expr: overlay_queue_depth{queue="settlement"} > 100
        for: 10m
        labels:
          severity: ticket
          service: settlement
        annotations:
          summary: "Settlement queue backlog > 100"
          description: "The settlement queue has held >100 waiting jobs for 10m."
          runbook_url: "https://github.com/CognitronTechnologies/overlay/blob/main/docs/RUNBOOK-ONCALL.md"

      # --- API error-rate SLO -----------------------------------------------
      # SLO: server errors are rare. Page on a burst of 5xx responses.
      - alert: ApiErrorRateHigh
        expr: sum(rate(overlay_http_errors_total[5m])) > 0.2
        for: 5m
        labels:
          severity: page
          service: api
        annotations:
          summary: "API 5xx error rate elevated"
          description: "The API is serving >0.2 server errors/sec (5xx) averaged over 5m."
          runbook_url: "https://github.com/CognitronTechnologies/overlay/blob/main/docs/RUNBOOK-ONCALL.md"

      # --- Scrape health ----------------------------------------------------
      # If the API stops exposing metrics we're blind to every SLO above.
      - alert: ApiMetricsDown
        expr: up{job="overlay-api"} == 0
        for: 5m
        labels:
          severity: page
          service: api
        annotations:
          summary: "Prometheus cannot scrape the Overlay API"
          description: "The overlay-api /metrics target has been down for 5m."
          runbook_url: "https://github.com/CognitronTechnologies/overlay/blob/main/docs/RUNBOOK-ONCALL.md"
