name: DB backup

# OB-094: scheduled logical backups of the production Postgres. Render's free
# Postgres has no automated backups, so this workflow takes a nightly pg_dump
# (custom format) and retains it as a build artifact. Set the PROD_DATABASE_URL
# repository secret to the production connection string to enable it; the job
# no-ops (does not fail) when the secret is absent. See docs/DR-RUNBOOK.md.

on:
  schedule:
    - cron: "0 3 * * *" # every day at 03:00 UTC
  workflow_dispatch:
    inputs:
      retention_days:
        description: "Artifact retention (days)"
        required: false
        default: "30"

concurrency:
  group: db-backup
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backup:
    name: pg_dump production → artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install postgresql-client-16
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16
      - name: Take backup
        id: backup
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::PROD_DATABASE_URL secret not set — skipping backup."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BACKUP_DIR=backups bash scripts/db-backup.sh
          echo "skipped=false" >> "$GITHUB_OUTPUT"
      - name: Upload backup artifact
        if: steps.backup.outputs.skipped == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: overlay-db-backup-${{ github.run_id }}
          path: backups/*.dump
          retention-days: ${{ github.event.inputs.retention_days || '30' }}
          if-no-files-found: error
