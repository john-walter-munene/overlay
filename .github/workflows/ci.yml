name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  lockfile:
    name: Lockfile in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # `npm ci` fails fast (EUSAGE) if package-lock.json is out of sync with
      # any package.json — e.g. a dep was added without running `npm install`.
      # --ignore-scripts keeps this quick (no Prisma engine download).
      - name: Verify package-lock.json is in sync
        run: npm ci --ignore-scripts --no-audit --no-fund

  shared:
    name: Shared engine (stats + integrity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Pure-logic tests (stats, integrity, odds/results mappers, payout math)
      # run on Node's native TS type-stripping. Some now import the built
      # `@overlay/shared` package (e.g. the grading engine used by the sports
      # mappers), so install workspace links and build shared first.
      # --ignore-scripts skips the Prisma engine download to keep this fast.
      - name: Install workspace (links only)
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Build shared package
        run: npm run build -w @overlay/shared
      - name: Run unit tests
        run: npm run test:unit

  build:
    name: Install & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run build

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    # Ephemeral Postgres for the run; the funds ledger → payout flow is tested
    # against a real DB (unit tests are pure-logic and need no database).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: overlay
          POSTGRES_PASSWORD: overlay
          POSTGRES_DB: overlay
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job proceeds.
        options: >-
          --health-cmd "pg_isready -U overlay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://overlay:overlay@localhost:5432/overlay?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The announcements integration tests load code that imports the built
      # `@overlay/shared` package (schedule/timezone maths), so build it first.
      - run: npm run build -w @overlay/shared
      - run: npm run prisma:generate
      # Apply all migrations (incl. the funds-ledger table) to the service DB.
      - run: npm run db:deploy
      - run: npm run test:integration
